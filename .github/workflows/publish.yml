name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  # Keep in sync with the check job in test.yml. Differs only in what is
  # event-specific there: the `if` skip guard and the checkout `ref` (here the
  # default checkout is the tagged commit). The id-token/contents grants live
  # on the publish job only.
  check:
    runs-on: ubuntu-latest

    # SECURITY: this job runs repo code (tests, dev dependencies) and must not
    # hold publish rights - never give it a write-capable GITHUB_TOKEN
    permissions:
      contents: read

    steps:
      - name: Checkout
        # https://github.com/actions/checkout
        uses: actions/checkout@v6
        with:
          # Nothing after clone needs git auth - don't leave a token in
          # .git/config for repo code to read
          persist-credentials: false

      - name: Setup Node.js
        # https://github.com/actions/setup-node
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: Setup Bun
        # https://github.com/oven-sh/setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Log versions
        run: |
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"
          echo "Bun: $(bun -v)"

      - name: Install dependencies
        run: bun install

      - name: Run checks
        env:
          # https://github.com/starmode-base/neon-testing/settings/variables/actions
          # https://github.com/starmode-base/neon-testing/settings/secrets/actions
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
        run: bun run check

  publish:
    needs: check
    runs-on: ubuntu-latest

    permissions:
      id-token: write # Required for Trusted Publishers (OIDC) - https://docs.npmjs.com/trusted-publishers
      contents: write # Required for creating releases - https://github.com/softprops/action-gh-release?tab=readme-ov-file#permissions

    steps:
      - name: Checkout
        # https://github.com/actions/checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        # https://github.com/actions/setup-node
        # Node 24 bundles npm >= 11.5.1, required for Trusted Publishers
        # https://docs.npmjs.com/trusted-publishers
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json
        # The git tag drives the GitHub release, package.json drives npm
        # publish - refuse to release if they disagree (e.g. a hand-pushed tag
        # on the wrong commit)
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Determine npm tag
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [[ "$VERSION" == *"-beta"* ]]; then
            echo "npm_tag=beta" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          elif [[ "$VERSION" == *"-canary"* ]] || [[ "$VERSION" == *"-alpha"* ]]; then
            echo "npm_tag=canary" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "npm_tag=latest" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        # Publish uses OIDC - no token needed
        # Provenance is automatically generated
        # https://docs.npmjs.com/trusted-publishers
        run: npm publish --tag ${{ steps.meta.outputs.npm_tag }}

      - name: Create GitHub Release
        # https://github.com/softprops/action-gh-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: v${{ steps.meta.outputs.version }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
