name: Integration tests

on:
  push:
    branches: [main]
  # pull_request_target enables secrets for fork PRs (required for Neon API)
  # SECURITY: Requires manual approval before running - configure at:
  # https://github.com/starmode-base/neon-testing/settings/actions
  # → "Require approval for all external contributors"
  pull_request_target:
    branches: [main]

# Cancel superseded runs of the same PR to avoid piling up Neon branches; main
# pushes queue instead so every main commit keeps a completed run
concurrency:
  group: test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request_target' }}

# SECURITY: this workflow runs fork code (after approval) - never give it a
# write-capable GITHUB_TOKEN
permissions:
  contents: read

jobs:
  test:
    # Skip version-bump commits ("release: vX.Y.Z", set by the release scripts
    # in package.json) - publish.yml already checks the same commit via its tag
    if: "${{ !startsWith(github.event.head_commit.message, 'release: v') }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # https://github.com/actions/checkout
        # For pull_request_target, explicitly checkout the PR head to test the contributor's code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          # Nothing after clone needs git auth - don't leave a token in
          # .git/config for fork code to read
          persist-credentials: false

      - name: Setup Node.js
        # https://github.com/actions/setup-node
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: Setup Bun
        # https://github.com/oven-sh/setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Log versions
        run: |
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"
          echo "Bun: $(bun -v)"

      - name: Install dependencies
        run: bun install

      - name: Run checks
        env:
          # https://github.com/starmode-base/neon-testing/settings/variables/actions
          # https://github.com/starmode-base/neon-testing/settings/secrets/actions
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
        run: bun run check
